<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8" />
	<title>GitBaz Settings</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			max-width: 480px;
			margin: 40px auto;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
			font-size: 14px;
			color: #1f2328;
			padding: 0 20px;
		}
		h1 { font-size: 20px; margin-bottom: 20px; }
		label { display: block; font-weight: 600; margin-bottom: 4px; }
		.hint { font-size: 12px; color: #656d76; margin-bottom: 8px; }
		input {
			width: 100%;
			padding: 8px 12px;
			border: 1px solid #d0d7de;
			border-radius: 6px;
			font-size: 14px;
			margin-bottom: 12px;
		}
		button {
			padding: 8px 16px;
			border: 1px solid #d0d7de;
			border-radius: 6px;
			background: #f6f8fa;
			cursor: pointer;
			font-size: 14px;
			margin-right: 8px;
		}
		button:hover { background: #eef0f2; }
		button.primary { background: #2da44e; color: #fff; border-color: #2da44e; }
		button.primary:hover { background: #218838; }
		button.danger { color: #cf222e; border-color: #cf222e; }
		button.danger:hover { background: #ffebe9; }
		.status { margin-top: 12px; font-size: 13px; }
		.status.success { color: #1a7f37; }
		.status.error { color: #cf222e; }
		.section { margin-bottom: 24px; }
	</style>
</head>
<body>
	<h1>GitBaz Settings</h1>

	<div class="section">
		<label for="token">GitHub Personal Access Token</label>
		<p class="hint">Needs no special scopes for public repos. Add <code>repo</code> scope for private repos.</p>
		<input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
		<button class="primary" id="save-btn">Save Token</button>
		<button class="danger" id="clear-btn">Clear</button>
		<div id="token-status" class="status"></div>
	</div>

	<div class="section">
		<label>Cache</label>
		<button id="clear-cache-btn">Clear Cache</button>
		<div id="cache-status" class="status"></div>
	</div>

	<script src="./options/main.ts" type="module"></script>
</body>
</html>
