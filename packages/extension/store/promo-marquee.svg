<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="560" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#4ade80" stroke-width="0.3" opacity="0.06"/>
  </pattern>
  <rect width="1400" height="560" fill="url(#grid)"/>

  <!-- ASCII art falcon head (left side, large) -->
  <g font-family="monospace, 'Courier New'" font-size="16" fill="#4ade80" transform="translate(80, 80)">
    <text x="85" y="0" opacity="0.5">+++++++</text>
    <text x="55" y="22" opacity="0.6">+++########+++</text>
    <text x="35" y="44" opacity="0.7">++############++</text>
    <text x="15" y="66" opacity="0.8">+################</text>
    <text x="-5" y="88" opacity="0.85">++##################+</text>
    <text x="-15" y="110" opacity="0.9">+####################++</text>

    <text x="-25" y="132" opacity="0.9">+####</text>
    <text x="85" y="132" fill="#0d1117">@@@@</text>
    <text x="145" y="132" opacity="0.9">######++</text>

    <text x="-35" y="154" opacity="0.95">+#####</text>
    <text x="75" y="154" fill="#0d1117">@@</text>
    <text x="105" y="154" fill="#8b949e" opacity="0.9">@@</text>
    <text x="135" y="154" fill="#0d1117">@@</text>
    <text x="165" y="154" opacity="0.9">####++</text>

    <text x="-25" y="176" opacity="0.9">+######</text>
    <text x="85" y="176" fill="#0d1117">@@@@</text>
    <text x="145" y="176" opacity="0.9">######++</text>

    <text x="-15" y="198" opacity="0.85">+####################</text>
    <text x="-5" y="220" opacity="0.8">+####</text>
    <text x="65" y="220" opacity="0.85">WWWWWWWWWW</text>
    <text x="5" y="242" opacity="0.7">+##</text>
    <text x="55" y="242" opacity="0.75">WWWWWWWW</text>
    <text x="165" y="242" opacity="0.5">;;</text>
    <text x="65" y="264" opacity="0.5">WWWW</text>
    <text x="95" y="286" opacity="0.35">WW</text>
    <text x="35" y="308" opacity="0.2">:::..</text>
    <text x="135" y="308" opacity="0.15">..::</text>
    <text x="65" y="330" opacity="0.1">. .  .</text>
  </g>

  <!-- Text (right side) -->
  <text x="750" y="220" font-family="monospace, 'Courier New'" font-size="72" font-weight="bold" fill="#e6edf3">GitBaz</text>

  <text x="750" y="275" font-family="monospace, 'Courier New'" font-size="22" fill="#4ade80">GitHub contributor context at a glance</text>

  <!-- Feature list -->
  <g font-family="monospace, 'Courier New'" font-size="18" fill="#8b949e" transform="translate(750, 320)">
    <text x="0" y="0"><tspan fill="#4ade80">$</tspan> Contributor scores and tier badges</text>
    <text x="0" y="36"><tspan fill="#4ade80">$</tspan> PR, issue and discussion context</text>
    <text x="0" y="72"><tspan fill="#4ade80">$</tspan> Bus factor and knowledge silos</text>
    <text x="0" y="108"><tspan fill="#4ade80">$</tspan> Activity heatmaps and bot detection</text>
  </g>

  <!-- Bottom accent -->
  <rect x="100" y="520" width="1200" height="2" fill="#4ade80" opacity="0.15" rx="1"/>
</svg>
