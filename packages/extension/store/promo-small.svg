<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#4ade80" stroke-width="0.3" opacity="0.08"/>
  </pattern>
  <rect width="440" height="280" fill="url(#grid)"/>

  <!-- ASCII art falcon head (centered, above text) -->
  <g font-family="monospace, 'Courier New'" font-size="6.5" fill="#4ade80" transform="translate(160, 8)">
    <text x="28" y="14" opacity="0.5">+++++++</text>
    <text x="18" y="21" opacity="0.6">+++########+++</text>
    <text x="12" y="28" opacity="0.7">++############++</text>
    <text x="6" y="35" opacity="0.8">+################</text>
    <text x="0" y="42" opacity="0.85">++##################+</text>
    <text x="-4" y="49" opacity="0.9">+####################++</text>
    <text x="-8" y="56" opacity="0.9">+####</text>
    <text x="30" y="56" fill="#0d1117">@@@@</text>
    <text x="50" y="56" opacity="0.9">######++</text>
    <text x="-10" y="63" opacity="0.95">+#####</text>
    <text x="28" y="63" fill="#0d1117">@@</text>
    <text x="38" y="63" fill="#8b949e" opacity="0.9">@@</text>
    <text x="48" y="63" fill="#0d1117">@@</text>
    <text x="58" y="63" opacity="0.9">####++</text>
    <text x="-8" y="70" opacity="0.9">+######</text>
    <text x="30" y="70" fill="#0d1117">@@@@</text>
    <text x="50" y="70" opacity="0.9">######++</text>
    <text x="-4" y="77" opacity="0.85">+####################</text>
    <text x="0" y="84" opacity="0.8">+####</text>
    <text x="24" y="84" opacity="0.85">WWWWWWWWWW</text>
    <text x="4" y="91" opacity="0.7">+##</text>
    <text x="20" y="91" opacity="0.75">WWWWWWWW</text>
    <text x="56" y="91" opacity="0.5">;;</text>
    <text x="24" y="98" opacity="0.5">WWWW</text>
    <text x="32" y="105" opacity="0.3">WW</text>
  </g>

  <!-- Title -->
  <text x="220" y="148" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="36" font-weight="bold" fill="#e6edf3">GitBaz</text>

  <!-- Subtitle -->
  <text x="220" y="175" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="14" fill="#4ade80">GitHub contributor context at a glance</text>

  <!-- Feature pills -->
  <g font-family="monospace, 'Courier New'" font-size="11" fill="#8b949e">
    <text x="80" y="215" text-anchor="middle">Scores</text>
    <text x="175" y="215" text-anchor="middle">Badges</text>
    <text x="265" y="215" text-anchor="middle">Bus Factor</text>
    <text x="365" y="215" text-anchor="middle">Heatmaps</text>
  </g>

  <circle cx="80" cy="225" r="1.5" fill="#4ade80" opacity="0.4"/>
  <circle cx="175" cy="225" r="1.5" fill="#4ade80" opacity="0.4"/>
  <circle cx="265" cy="225" r="1.5" fill="#4ade80" opacity="0.4"/>
  <circle cx="365" cy="225" r="1.5" fill="#4ade80" opacity="0.4"/>

  <rect x="60" y="255" width="320" height="1" fill="#4ade80" opacity="0.2" rx="0.5"/>
</svg>
