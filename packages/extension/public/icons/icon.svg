<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- ASCII art falcon head - monospace grid -->
  <!-- Each character is ~4px wide, ~5.5px tall at font-size 5 -->
  <g font-family="monospace, 'Courier New'" font-size="4.8" fill="#4ade80">
    <!-- Row 1-3: Top of head -->
    <text x="42" y="18" opacity="0.5">+++++++</text>
    <text x="34" y="23" opacity="0.6">+++########+++</text>
    <text x="30" y="28" opacity="0.7">++############++</text>

    <!-- Row 4-6: Upper head -->
    <text x="26" y="33" opacity="0.8">+################</text>
    <text x="22" y="38" opacity="0.85">++##################+</text>
    <text x="20" y="43" opacity="0.9">+####################++</text>

    <!-- Row 7-9: Eye area -->
    <text x="18" y="48" opacity="0.9">+####</text>
    <text x="46" y="48" fill="#0d1117" opacity="1">@@@@</text>
    <text x="62" y="48" opacity="0.9">######++</text>

    <text x="16" y="53" opacity="0.95">+#####</text>
    <text x="44" y="53" fill="#0d1117" opacity="1">@@</text>
    <text x="52" y="53" fill="#8b949e" opacity="0.9">@@</text>
    <text x="60" y="53" fill="#0d1117" opacity="1">@@</text>
    <text x="68" y="53" opacity="0.9">####++</text>

    <text x="16" y="58" opacity="0.95">+######</text>
    <text x="46" y="58" fill="#0d1117" opacity="1">@@@@</text>
    <text x="62" y="58" opacity="0.9">######++</text>

    <!-- Row 10-12: Below eye, beak area -->
    <text x="18" y="63" opacity="0.9">+####################</text>
    <text x="20" y="68" opacity="0.85">+################</text>
    <text x="16" y="73" opacity="0.85">++####</text>
    <text x="44" y="73" opacity="0.9">WWWWWW</text>
    <text x="68" y="73" opacity="0.7">===</text>

    <!-- Row 13-15: Beak -->
    <text x="18" y="78" opacity="0.8">+####</text>
    <text x="40" y="78" opacity="0.85">WWWWWWWWWW</text>
    <text x="20" y="83" opacity="0.7">+##</text>
    <text x="36" y="83" opacity="0.8">WWWWWWWW</text>
    <text x="68" y="83" opacity="0.6">--;</text>

    <!-- Row 16-18: Lower beak / chin -->
    <text x="24" y="88" opacity="0.6">++</text>
    <text x="36" y="88" opacity="0.7">WWWWWW</text>
    <text x="64" y="88" opacity="0.5">;;</text>
    <text x="40" y="93" opacity="0.5">WWWW</text>
    <text x="56" y="93" opacity="0.4">..</text>
    <text x="46" y="98" opacity="0.3">WW</text>

    <!-- Row 19-20: Chin feather details -->
    <text x="28" y="103" opacity="0.25">:::..</text>
    <text x="58" y="103" opacity="0.2">..::</text>
    <text x="36" y="108" opacity="0.15">. .  .</text>
  </g>

  <!-- Subtle scan lines -->
  <line x1="14" y1="115" x2="114" y2="115" stroke="#4ade80" stroke-width="0.5" opacity="0.12"/>
  <line x1="14" y1="118" x2="90" y2="118" stroke="#4ade80" stroke-width="0.5" opacity="0.08"/>
</svg>
